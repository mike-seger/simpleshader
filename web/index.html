<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Shader</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Left sidebar: shader list -->
  <aside id="sidebar">
    <div class="sidebar-header">Shaders</div>
    <nav id="shader-tree"></nav>
  </aside>

  <!-- Main area: preview + editor -->
  <main id="main">
    <!-- Preview pane -->
    <section id="preview-pane">
      <canvas id="glcanvas"></canvas>
      <div id="error-overlay" class="hidden"></div>
      <div id="debug-box" class="hidden">
        <span id="fps-display">0 FPS</span>
      </div>
    </section>

    <!-- Draggable horizontal separator -->
    <div id="hsplit" role="separator" aria-orientation="horizontal"></div>

    <!-- Editor pane -->
    <section id="editor-pane">
      <div id="editor-toolbar">
        <button id="btn-apply" title="Apply shader (Ctrl+Enter)">&#9654; Apply</button>
        <label class="toolbar-check">
          <input type="checkbox" id="chk-debug"> FPS
        </label>
      </div>
      <div id="editor-container"></div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
