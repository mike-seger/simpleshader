<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Material Symbols Preview</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Material Symbols Preview</h1>
    <p>Lists every ligature included in player.woff2.</p>
    <ul id="icon-list"></ul>
  </main>
  <script src="used-symbols-names.js"></script>
  <script>
    document.getElementById('icon-list').innerHTML = SYMBOL_NAMES.map(name =>
      `<li><span class="icon" aria-hidden="true">${name}</span><code>${name}</code></li>`
    ).join('');
  </script>
</body>
</html>
