<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Shader</title>
  <link rel="stylesheet" href="web/css/style.css">
</head>
<body>
  <!-- Left sidebar: icon bar + shader list -->
  <aside id="sidebar">
    <div id="sidebar-icons">
      <button class="sb-icon" id="btn-mode-list" title="Shader list">list_alt</button>
      <button class="sb-icon" id="btn-mode-tune" title="Tune shader">tune</button>
      <div class="sb-separator sb-shader-action"></div>
      <button class="sb-icon sb-shader-action" id="btn-new" title="New shader">add</button>
      <button class="sb-icon sb-shader-action" id="btn-download" title="Download custom shaders">download</button>
      <button class="sb-icon sb-shader-action" id="btn-duplicate" title="Duplicate shader">content_copy</button>
      <button class="sb-icon sb-shader-action" id="btn-delete" title="Delete custom shader">delete</button>
      <div class="sb-separator"></div>
      <button class="sb-icon" id="btn-debug" title="Toggle debug overlay">bug_report</button>
      <button class="sb-icon" id="btn-popout" title="Pop-out preview">open_in_new</button>
    </div>
    <div id="sidebar-list">
      <div class="sidebar-header">Shaders</div>
      <nav id="shader-tree"></nav>
    </div>
    <div id="sidebar-tuner" class="hidden">
      <div class="sidebar-header">Shader Controls</div>
      <div id="tuner-container"></div>
    </div>
  </aside>

  <!-- Main area: preview + editor -->
  <main id="main">
    <!-- Preview pane -->
    <section id="preview-pane">
      <canvas id="glcanvas"></canvas>
      <div id="error-overlay" class="hidden"></div>
      <div id="debug-box" class="hidden">
        <div id="fps-display">– FPS</div>
        <div id="time-display">–:–</div>
        <div id="res-display">–</div>
      </div>
    </section>

    <!-- Draggable horizontal separator -->
    <div id="hsplit" role="separator" aria-orientation="horizontal"></div>

    <!-- Editor pane -->
    <section id="editor-pane">
      <div id="editor-toolbar">
        <button id="btn-apply" title="Apply shader (Ctrl+Enter)">&#9650;</button>
        <button id="btn-playpause" class="tb-icon" title="Play / Pause">pause</button>
        <button id="btn-reset-time" class="tb-icon" title="Reset to 0:00">skip_previous</button>
        <input id="time-slider" type="range" min="0" max="600" step="0.1" value="0" title="Scrub u_time">
        <span id="toolbar-time">00:00</span>
      </div>
      <div id="editor-container"></div>
    </section>
  </main>

  <script type="module" src="web/js/app.js"></script>
</body>
</html>
